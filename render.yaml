services:
  - type: web
    name: copy-dashboard
    runtime: node
    plan: free
    buildCommand: ./render-build.sh
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: copy-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer

databases:
  - name: copy-db
    plan: free
